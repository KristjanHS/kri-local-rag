name: Meta linters (workflows, YAML, Dockerfiles)

on:
  pull_request:
    paths:
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
      - "**/*.yml"
      - "**/*.yaml"
      - "Dockerfile"
      - "docker/**"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: meta-linters-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI runners are CPU-only — select the cpu torch extra so no CUDA wheels are
  # pulled. See docs/plans/archive/2026-06-23-gpu-cpu-torch-extras.md.
  KRI_VARIANT: cpu

jobs:
  actionlint:
    name: Actionlint (workflows)
    if: ${{ github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        # B6: digest-pinned (was mutable :latest). Renovate's docker:pinDigests maintains it.
        uses: docker://rhysd/actionlint:latest@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: -color
  yamlfmt:
    name: "Yamlfmt (repo YAML)"
    if: ${{ github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python + uv (cached)
        uses: ./.github/actions/setup-uv
      - name: Yamlfmt via Makefile
        run: make yamlfmt
  hadolint:
    name: Hadolint (Dockerfiles)
    if: ${{ github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run hadolint
        # B6: SHA-pinned (was mutable @v3.1.0 tag). Renovate's pinGitHubActionDigests maintains it.
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: docker/app.Dockerfile
          format: github
