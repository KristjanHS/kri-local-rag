name: Auto Create Pull Request (manual)

on:
  workflow_dispatch: {}

# B5: least-privilege GITHUB_TOKEN (was inheriting the broad default).
# peter-evans/create-pull-request pushes the branch ref, so it needs
# contents: write (its documented minimum), not contents: read.
permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    # Kept for manual runs only; local post-push hook handles auto PR creation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request
        # B6: SHA-pinned (was mutable @v6 tag). Renovate's pinGitHubActionDigests maintains it.
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "feat: Auto-generated PR for ${{ github.ref_name }}"
          labels: auto-generated
          base: main
          branch: ${{ github.ref_name }}
          delete-branch: false
