# Dependabot configuration.
#
# Python deps are managed with uv: pyproject.toml is the source of truth and
# uv.lock pins the resolved graph. The `uv` ecosystem reads both, so direct and
# transitive bumps land where they actually take effect.
#
# We deliberately do NOT declare a `pip` ecosystem. requirements.txt is an
# autogenerated, gitignored artifact (regenerated via `make export-reqs`); a
# `pip` updater would raise no-op PRs against a derived file that the install
# path never reads. Not declaring it is how that file stays ignored here.
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Collapse routine minor/patch bumps into one PR to cut review noise;
    # majors still come through individually so they get a closer look.
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
