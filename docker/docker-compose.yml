name: kri-local-rag
services:
  # ---------- Local Weaviate database ------------------------------------------------
  weaviate:
    # Digest-pinned for supply-chain integrity (B7). Renovate's docker:pinDigests
    # keeps the tag@sha256 pair current.
    image: cr.weaviate.io/semitechnologies/weaviate:1.32.0@sha256:9452e68c58c287c8c29a525ff1468c209cd5e106cc927d67b7d34d61533151b3
    # Defense-in-depth: restart on unexpected crashes. The eth0-IP startup race that
    # originally motivated this directive is now fixed at the source via
    # CLUSTER_IN_LOCALHOST below (memberlist binds to 127.0.0.1, always up at boot).
    restart: on-failure
    # Host ports are parametrized so the `test` profile can run alongside the live
    # stack on distinct ports (scripts/dev/test-env.sh sets the *_HOST_PORT vars).
    # Container-side ports stay fixed at 8080/50051 — internal DNS and healthchecks
    # are unaffected.
    ports:
      - "127.0.0.1:${WEAVIATE_HTTP_HOST_PORT:-8080}:8080"
      - "127.0.0.1:${WEAVIATE_GRPC_HOST_PORT:-50051}:50051"
    volumes:
      - weaviate_db:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      # B4: Anonymous access is intentional under this stack's trust model — Weaviate
      # is bound to 127.0.0.1 (see `ports:` above) for strict single-user localhost use.
      # Any local process can read/delete the index, which is acceptable for a local-only
      # deployment. If this port is ever bound to 0.0.0.0 or the stack becomes multi-user,
      # enable API-key auth by wiring in `docker/weaviate_auth.notused`.
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      DEFAULT_VECTORIZER_MODULE: 'none' # We are providing vectors manually
      # ENABLE_MODULES: 'text2vec-huggingface,reranker-huggingface' # Still needed for reranker
      CLUSTER_HOSTNAME: 'node1'
      # Single-node deployment: pin memberlist/gossip to loopback. Without this,
      # Weaviate tries to advertise on the primary interface's private IP, which on
      # WSL2/Docker is often not assigned yet at boot — memberlist then exits 1 with
      # "No private IP address found" and the container flaps (restart: on-failure
      # never converges because eth0 stays IP-less). 127.0.0.1 is always up at boot,
      # so startup is deterministic. Targeting CLUSTER_ADVERTISE_INTERFACE: eth0 did
      # not help — it still depends on eth0 having a routable IP in time.
      CLUSTER_IN_LOCALHOST: 'true'
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/v1/.well-known/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  # ---------- Local LLM server for generating RAG answers ---------------------------------------------------
  ollama:
    # Digest-pinned default for supply-chain integrity (B7); override via OLLAMA_IMAGE.
    # Renovate's docker:pinDigests keeps the tag@sha256 pair current.
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest@sha256:bfc9c6d53cc6989aa5131a6fde6b162b2802d4d337657f3253b5f69579bddeee}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ../model_cache:/root/.ollama
    ports:
      - "127.0.0.1:${OLLAMA_HOST_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ---------- RAG App Container (supports both web app and CLI) -----------------------------------------
  app:
    image: kri-local-rag-app
    build:
      context: ..
      dockerfile: docker/app.Dockerfile
      target: runtime
      args:
        # Install backend editable so the ../backend bind mount below is live:
        # edits are picked up on app restart, no image rebuild required.
        INSTALL_EDITABLE: "1"

    ports:
      # Parametrized so the test stack's app-test (which inherits this via `extends`)
      # lands on a distinct host port instead of colliding with the live app on 8501.
      - "${APP_HOST_PORT:-8501}:8501"
    volumes:
      - ../backend:/app/backend # Live backend code (for editable runtime package in Dev)
      - ../frontend:/app/frontend # Live frontend code            (for hot reload in Dev)
      - ../tests:/app/tests:ro # Live tests for in-container testing
      - ../data:/app/data # Live data access (read-write: GUI ingest writes uploaded PDFs here)
      - ../example_data:/app/example_data:ro # Ensure example_data matches project layout
    working_dir: /app

    # Use command here only when you need to override the CMD at the end of Dockerfile.
    # command: ["/opt/venv/bin/python", "-m", "streamlit", "run", "frontend/rag_app.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.headless=true", "--browser.gatherUsageStats=false"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8501/_stcore/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    depends_on:
      weaviate:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      # Point the Python code to the other services inside the compose network
      - OLLAMA_URL=http://ollama:11434
      - WEAVIATE_URL=http://weaviate:8080
      # Keep Transformers in text-only mode inside the container (avoid torchvision)
      - TRANSFORMERS_NO_TORCHVISION=1
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - APP_LOG_DIR=/app/logs

  # ---------- Test App Container (profile: test) -----------------------------------------
  app-test:
    profiles: ["test"]
    extends: app
    image: kri-local-rag-app:test
    build:
      target: runtime
      args:
        INSTALL_DEV: "1"
    ports: []
    command: ["tail", "-f", "/dev/null"]
    # app-test runs `tail -f /dev/null`, so there is nothing to probe. `extends app`
    # otherwise drags in app's healthcheck *timing* (interval 5s, start_period 30s) even
    # when `test` is overridden — and `up --wait` then blocks ~5s waiting for the first
    # no-op probe before app-test flips to healthy. Disabling the healthcheck lets
    # `--wait` return as soon as the container is running; readiness that actually matters
    # (weaviate + ollama) is still gated via depends_on. Saves ~5s per `make test-up`.
    healthcheck:
      disable: true

  # ---------- One-off Ingestion Utility -----------------------------------------
  ingester:
    profiles: ["ingest"]
    image: kri-local-rag-app # reuse the APP image
    depends_on:
      weaviate:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ../backend:/app/backend # Live backend code
      - ../data:/app/data # Live data access
    environment:
      # Point the Python code to the other services inside the compose network
      - OLLAMA_URL=http://ollama:11434
      - WEAVIATE_URL=http://weaviate:8080
      # Keep Transformers in text-only mode inside the container (avoid torchvision)
      - TRANSFORMERS_NO_TORCHVISION=1
      - APP_LOG_DIR=/app/logs
    command: ["python", "-m", "backend.ingest", "--data-dir", "/app/data"]

volumes:
  weaviate_db:
